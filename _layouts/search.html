---
layout: default
---
<header class="page-header">
  <h1 class="page-title">{{ page.title }}</h1>
  <p class="page-description">Type to filter posts by title, excerpt, or category. Results update as you type.</p>
</header>

<div class="search-bar">
  <input
    type="search"
    id="search-input"
    class="search-input"
    placeholder="Search posts…"
    autocomplete="off"
    autofocus
    aria-label="Search posts"
  />
  <p id="search-status" class="search-status" aria-live="polite"></p>
</div>

<section id="search-results" class="post-list" aria-label="Search results"></section>

<noscript>
  <p class="empty-state">Search needs JavaScript. With it off, browse from the homepage or use a category page from the nav.</p>
</noscript>

<script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
